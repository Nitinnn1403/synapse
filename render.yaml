services:
  - type: web
    name: synapse-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_DAYS
        value: 7
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_FAST
        value: llama-3.1-8b-instant
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: TOP_K_RETRIEVAL
        value: 20
      - key: TOP_K_RERANK
        value: 5
      - key: BM25_WEIGHT
        value: "0.3"
      - key: VECTOR_WEIGHT
        value: "0.7"
      - key: CHUNK_MIN_SIZE
        value: 100
      - key: CHUNK_MAX_SIZE
        value: 1500
      - key: SIMILARITY_THRESHOLD_PERCENTILE
        value: 25
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_data
      - key: BM25_INDEX_DIR
        value: /data/bm25_index
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/rag_assistant.db
      - key: HOST
        value: "0.0.0.0"
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: synapse-data
      mountPath: /data
      sizeGB: 10
